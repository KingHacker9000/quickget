name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        shell: pwsh
        run: |
          $files = gofmt -l .
          if ($files) {
            Write-Output $files
            throw "gofmt -w is required for files listed above"
          }

      - name: Build quickget
        run: go build ./cmd/quickget

      - name: Build quickget-agent
        run: go build ./cmd/quickget-agent

      - name: Run tests
        run: go test ./...
